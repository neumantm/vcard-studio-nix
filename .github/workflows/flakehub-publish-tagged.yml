name: "Publish tags to FlakeHub"
on:
  push:
    tags:
      - "v?[0-9]+.[0-9]+.[0-9]+*"
  workflow_dispatch:
    inputs:
      tag:
        description: "The existing tag to publish to FlakeHub"
        type: "string"
        required: true
jobs:
  flakehub-publish:
    runs-on: "ubuntu-latest"
    permissions:
      id-token: "write"
      contents: "read"
    steps:
      - uses: "actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd" # v6
        with:
          ref: "${{ (inputs.tag != null) && format('refs/tags/{0}', inputs.tag) || '' }}"
      - uses: "DeterminateSystems/nix-installer-action@1d87d45818068401a10cf16bdc5f00b24994a83f" # main
      - uses: "DeterminateSystems/flakehub-push@bfc2781eb39e5b27112b6ea8ea48f7d6c8183d67" # main
        with:
          visibility: "public"
          name: "neumantm/vcard-studio-nix"
          tag: "${{ inputs.tag }}"
