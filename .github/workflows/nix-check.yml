name: "Test"
on:
  pull_request:
  push:
    branches: [main]
jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - name: Check Nix flake inputs
      uses: DeterminateSystems/flake-checker-action@v12
    - name: Install nix
      uses: cachix/install-nix-action@v31
    - name: Build
      run: nix build
    - name: Flake Check
      run: nix flake check
